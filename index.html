<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV 服务客户端部署工具 (最终版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f8f9fa; color: #343a40; line-height: 1.7; }
        .container { background-color: #fff; padding: 20px 40px 40px 40px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        h1, h3 { color: #2c3e50; }
        h1 { text-align: center; margin-bottom: 30px;}
        .config-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; }
        select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ced4da; border-radius: 5px; background-color: white; }
        button { display: block; width: 100%; padding: 14px; font-size: 18px; font-weight: bold; color: white; background: linear-gradient(90deg, #2ecc71, #27ae60); border: none; border-radius: 5px; cursor: pointer; margin-top: 30px; }
        pre { background-color: #2c3e50; color: #f8f8f2; padding: 20px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; margin-top: 10px; font-size: 14px; }
        #result { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;}
        .note { font-size: 14px; color: #6c757d; margin-top: 10px; padding: 10px; background-color: #e9ecef; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 IPTV 服务客户端部署工具 🚀</h1>
        <p class="note">欢迎！本工具将帮助您在自己的设备上快速部署服务客户端。请按照以下步骤操作，即可享用专属直播源服务。</p>
        
        <div class="config-group">
            <label for="user-token">1. 粘贴您的专属通行证 (Token)</label>
            <input type="text" id="user-token" placeholder="将管理员提供给您的专属Token粘贴到这里">
        </div>

        <div class="config-group">
            <label for="route-mode">2. 选择您的网络模式</label>
            <select id="route-mode">
                <option value="bridge" selected>主路由模式 (推荐)</option>
                <option value="host">旁路由模式 (NAS或高级用户)</option>
            </select>
        </div>

        <div class="config-group">
            <label for="local-port">3. 设置您设备上的访问端口 (1-65535)</label>
            <input type="number" id="local-port" value="8080">
            <p class="note">您以后将通过这个端口访问服务。如果`8080`端口已被占用，请换一个未被使用的端口。</p>
        </div>
        
        <div class="config-group">
            <label for="local-ip">4. (可选) 输入您部署设备的局域网IP</label>
            <input type="text" id="local-ip" placeholder="例如: 192.168.1.10，留空则默认为 127.0.0.1">
        </div>

        <button onclick="generateUserDeployment()">✨ 一键生成部署方案 ✨</button>

        <div id="result" class="hidden">
            <h3>请在您的设备上创建 <code>docker-compose.yml</code> 文件，并粘贴以下内容：</h3>
            <pre id="compose-output"></pre>
            
            <h3>✅ 部署成功后，您的专属播放地址是：</h3>
            <pre id="m3u-output"></pre>
        </div>
    </div>

    <script>
        function generateUserDeployment() {
            const userToken = document.getElementById('user-token').value.trim();
            if (!userToken) {
                alert('请输入管理员提供给您的专属Token！');
                return;
            }

            const routeMode = document.getElementById('route-mode').value;
            const localPort = document.getElementById('local-port').value;

            // 硬编码你的中央服务器地址和客户端镜像地址
            const centralHubUrl = "http://ipvt.559888.xyz:8000";
            const clientImageName = "你的DockerHub用户名/iptv-client:latest"; // !! 请务必修改成你自己的 !!
            
            const localIp = document.getElementById('local-ip').value.trim() || '127.0.0.1';

            let portMapping = `
    ports:
      - "${localPort}:8000"`;
            let networkMode = '';
            if (routeMode === 'host') {
                portMapping = ''; // host模式不需要端口映射
                networkMode = `
    network_mode: "host"`;
            }

            const composeContent = `version: '3.8'
services:
  iptv-client:
    image: ${clientImageName}
    container_name: my-iptv-client
    restart: always${networkMode}${portMapping}
    environment:
      - CENTRAL_HUB_URL=${centralHubUrl}
      - USER_TOKEN=${userToken}`;

            const m3uUrl = `http://${localIp}:${localPort}/tv.m3u`;

            document.getElementById('compose-output').textContent = composeContent;
            document.getElementById('m3u-output').textContent = m3uUrl;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
